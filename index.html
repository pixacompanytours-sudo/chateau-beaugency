<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Château de Beaugency</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height:100vh;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Raleway',sans-serif;
}
.page {
  width:100%;
  max-width:430px;
  min-height:100vh;
  position:relative;
  overflow:hidden;
  background:#000;
}

/* === PHOTO BACKGROUND TOP === */
.photo-bg {
  position:absolute;
  top:0; left:0; right:0;
  height:52%;
  overflow:hidden;
}
.photo-bg img {
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* dark overlay over photo */
.photo-overlay {
  position:absolute;
  top:0; left:0; right:0;
  height:55%;
  background: linear-gradient(to bottom,
    rgba(0,0,0,0.15) 0%,
    rgba(0,0,0,0.4) 60%,
    rgba(0,0,0,0.95) 100%
  );
  z-index:1;
}

/* === CONTENT === */
.content {
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:22%;
  padding-bottom:2.5rem;
}

.logo-wrap { margin-bottom:1rem; }
.logo-circle {
  width:72px; height:72px;
  border-radius:50%;
  border:2.5px solid #c8960c;
  overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 0 4px rgba(200,150,12,0.2), 0 0 30px rgba(200,150,12,0.3);
}
.logo-circle img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.title-block { text-align:center; margin-bottom:0.4rem; }
.t-chateau {
  font-family:'Cinzel',serif;
  font-size:2.6rem;
  font-weight:900;
  color:#fff;
  letter-spacing:0.1em;
  line-height:1;
  display:block;
}
.t-de {
  font-family:'Cinzel',serif;
  font-size:1.05rem;
  font-weight:400;
  color:#ddd;
  letter-spacing:0.3em;
  display:block;
  margin:0.1rem 0;
}
.t-beaugency {
  font-family:'Cinzel',serif;
  font-size:2rem;
  font-weight:700;
  color:#ffffff;
  letter-spacing:0.18em;
  display:block;
  text-shadow:0 0 20px rgba(255,255,255,0.4);
}
.subtitle {
  font-size:0.62rem;
  letter-spacing:0.22em;
  color:#bbb;
  text-transform:uppercase;
  margin:0.7rem 0 0.4rem;
  font-weight:500;
}
.divider {
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:1.5rem;
  color:#c8960c;
}
.dline { width:55px; height:1px; background:linear-gradient(to right, transparent, #c8960c); }
.dline.r { background:linear-gradient(to left, transparent, #c8960c); }

/* BUTTONS */
.links {
  width:86%;
  display:flex;
  flex-direction:column;
  gap:13px;
  margin-bottom:1.8rem;
}
.btn {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  padding:0.95rem 1.4rem;
  border:1.5px solid #c8960c;
  border-radius:50px;
  background:rgba(0,0,0,0.6);
  color:#fff;
  text-decoration:none;
  font-family:'Raleway',sans-serif;
  font-size:0.85rem;
  font-weight:700;
  letter-spacing:0.14em;
  text-transform:uppercase;
  transition:all 0.25s;
  backdrop-filter:blur(4px);
}
.btn:hover {
  background:rgba(200,150,12,0.18);
  transform:translateY(-1px);
  box-shadow:0 6px 24px rgba(200,150,12,0.3);
}
.btn-icon { color:#c8960c; flex-shrink:0; width:24px; height:24px; }
.btn-label { flex:1; text-align:center; }

/* SOCIALS */
.socials {
  display:flex;
  gap:18px;
  margin-bottom:1.8rem;
}
.soc {
  width:46px; height:46px;
  border-radius:50%;
  border:1.5px solid rgba(200,150,12,0.55);
  background:rgba(0,0,0,0.5);
  display:flex; align-items:center; justify-content:center;
  color:#c8960c;
  text-decoration:none;
  transition:all 0.25s;
  backdrop-filter:blur(4px);
}
.soc:hover {
  border-color:#c8960c;
  background:rgba(200,150,12,0.15);
  transform:translateY(-2px);
  box-shadow:0 5px 18px rgba(200,150,12,0.35);
}
.soc svg { width:19px; height:19px; fill:currentColor; }

.tagline {
  font-family:'Cinzel',serif;
  font-size:0.58rem;
  letter-spacing:0.15em;
  color:#7a5e2a;
  text-align:center;
  text-transform:uppercase;
  padding:0 1rem;
}
</style>
</head>
